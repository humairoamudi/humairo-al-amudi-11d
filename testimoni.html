<html lang="id">
<head>

<body>
<nav>

<h1>toko buku arabic'z</h1>
<main class="formulir">
    <h2>Berikan testimoni anda</h2>
    <form id="formTestimoni">
        <label for="nama">Nama:</label>
        <input type="text" id="nama" name="nama" required placeholder="Nama Lengkap">

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required placeholder="Humaidy@gmail.com">

        <label for="pesan">Testimoni Anda:</label>
        <textarea id="pesan" name="pesan" required placeholder="Alhamdulillah, buku sampai dengan aman dan rapi. Kualitas kitabnya bagus, sesuai deskripsi. Recommended beli di Arabic’z." rows="5"></textarea>

        <label for="asal">Asal sekolah/ Komunitas:</label>
        <input type="text" id="asal" name="asal" required placeholder="SMA Ali Imron">

        <label for="judul">Buku Yang Dibeli:</label>
        <input type="text" id="judul" name="judul">

        <label for="rating">Rating Buku (1-10):</label>
        <input type="number" id="rating" name="rating " >


        <button type="submit">Kirim Testimoni</button>
    </form>
</main>
<footer>
    <p>&copy; 2026 Toko Buku Arabic'z</p>
</footer>
<script>
    document.getElementById('formTestimoni').addEventListener('submit', function(e) {
        e.preventDefault();
        const nama=document.getElementById('nama').value;
        const email=document.getElementById('email').value;
        const pesan=document.getElementById('pesan').value;
        const asal=document.getElementById('asal').value;
        const judul=document.getElementById('judul').value;
        const rating=document.getElementById('rating').value;
        const dataBaru={nama,email,pesan,asal,judul,rating};

        //ambil list dari localStorage
        const testimoniList=JSON.parse(localStorage.getItem('testimoniList')) || [];

        //Tambahkan testimoni baru 
        testimoniList.push(dataBaru);

        //Simpan kembali ke localStorage
        localStorage.setItem('testimoniList', JSON.stringify(testimoniList));
        
        //Arahkan ke halaman kopnfirmasi 
        window.location.href='proses-testimoni.html'; 
    });

    
</script>

 
</main>
</body>

</html>
